<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Altitude Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0c10;
      --surface: #0f1318;
      --surface2: #151b22;
      --border: #1e2d3d;
      --accent: #00d4ff;
      --accent2: #7b2fff;
      --green: #00ff88;
      --red: #ff3860;
      --yellow: #ffd700;
      --text: #c8d6e5;
      --text-dim: #4a6080;
      --glow: 0 0 12px rgba(0, 212, 255, 0.4);
      --glow-green: 0 0 10px rgba(0, 255, 136, 0.4);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.08) 2px,
        rgba(0, 0, 0, 0.08) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      position: relative;
    }

    .logo-icon svg {
      filter: drop-shadow(var(--glow));
    }

    .logo-text {
      font-family: 'Orbitron', sans-serif;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 4px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-transform: uppercase;
    }

    .logo-sub {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 2px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: var(--glow-green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .last-updated {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 1px;
    }

    .refresh-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--accent);
      padding: 6px 14px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
    }

    .refresh-btn:hover {
      border-color: var(--accent);
      box-shadow: var(--glow);
      background: rgba(0, 212, 255, 0.05);
    }

    /* Stats Bar */
    .stats-bar {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .stat-item {
      flex: 1;
      padding: 12px 24px;
      border-right: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .stat-item:last-child { border-right: none; }

    .stat-label {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .stat-value {
      font-family: 'Orbitron', sans-serif;
      font-size: 18px;
      font-weight: 700;
    }

    .stat-value.running { color: var(--green); text-shadow: var(--glow-green); }
    .stat-value.stopped { color: var(--red); }
    .stat-value.total { color: var(--accent); text-shadow: var(--glow); }

    /* Filters */
    .toolbar {
      padding: 20px 32px 0;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .filter-label {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .filter-btns {
      display: flex;
      gap: 8px;
    }

    .filter-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 5px 14px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
    }

    .filter-btn.active,
    .filter-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(0, 212, 255, 0.05);
    }

    .search-box {
      margin-left: auto;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 14px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      width: 220px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-box::placeholder { color: var(--text-dim); }
    .search-box:focus { border-color: var(--accent); }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
      padding: 24px 32px 40px;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      position: relative;
      cursor: pointer;
      transition: all 0.25s;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.03), transparent 60%);
      pointer-events: none;
    }

    .card:hover {
      border-color: var(--accent);
      box-shadow: var(--glow), inset 0 0 30px rgba(0, 212, 255, 0.03);
      transform: translateY(-2px);
    }

    .card.no-url {
      cursor: default;
    }

    .card.no-url:hover {
      border-color: var(--border);
      box-shadow: none;
      transform: none;
    }

    /* Corner accents */
    .card-corner {
      position: absolute;
      width: 12px;
      height: 12px;
      border-color: var(--accent);
      border-style: solid;
      opacity: 0.4;
      transition: opacity 0.25s;
    }

    .card:hover .card-corner { opacity: 1; }

    .card-corner.tl { top: 0; left: 0; border-width: 2px 0 0 2px; }
    .card-corner.tr { top: 0; right: 0; border-width: 2px 2px 0 0; }
    .card-corner.bl { bottom: 0; left: 0; border-width: 0 0 2px 2px; }
    .card-corner.br { bottom: 0; right: 0; border-width: 0 2px 2px 0; }

    .card-header {
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .card-icon {
      width: 38px;
      height: 38px;
      border-radius: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      overflow: hidden;
    }

    .card-icon img {
      width: 28px;
      height: 28px;
      object-fit: contain;
    }

    .card-meta {
      flex: 1;
      min-width: 0;
    }

    .card-name {
      font-family: 'Orbitron', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-image {
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 2px 8px;
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      border: 1px solid;
      flex-shrink: 0;
    }

    .badge.running {
      color: var(--green);
      border-color: rgba(0, 255, 136, 0.3);
      background: rgba(0, 255, 136, 0.05);
    }

    .badge.exited, .badge.stopped {
      color: var(--red);
      border-color: rgba(255, 56, 96, 0.3);
      background: rgba(255, 56, 96, 0.05);
    }

    .badge.paused {
      color: var(--yellow);
      border-color: rgba(255, 215, 0, 0.3);
      background: rgba(255, 215, 0, 0.05);
    }

    .badge-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: currentColor;
    }

    .badge.running .badge-dot {
      animation: pulse 1.5s infinite;
    }

    .card-body {
      padding: 14px 18px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
      font-size: 11px;
    }

    .info-key {
      color: var(--text-dim);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .info-val {
      color: var(--text);
      text-align: right;
      max-width: 60%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .info-val.port-link {
      color: var(--accent);
    }

    .stats-mini {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 16px;
    }

    .mini-stat {
      flex: 1;
    }

    .mini-label {
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .mini-bar-wrap {
      height: 3px;
      background: var(--surface2);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 4px;
    }

    .mini-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 2px;
      transition: width 0.5s;
    }

    .mini-val {
      font-size: 10px;
      color: var(--accent);
    }

    .card-footer {
      padding: 10px 18px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(0,0,0,0.2);
    }

    .card-id {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 1px;
    }

    .action-btns {
      display: flex;
      gap: 6px;
    }

    .action-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 3px 10px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
    }

    .action-btn:hover { border-color: var(--accent); color: var(--accent); }
    .action-btn.stop:hover { border-color: var(--red); color: var(--red); }
    .action-btn.start:hover { border-color: var(--green); color: var(--green); }

    /* Empty state */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
      color: var(--text-dim);
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    .empty-text {
      font-family: 'Orbitron', sans-serif;
      font-size: 14px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* Loading */
    .loading {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 80px;
      color: var(--text-dim);
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 12px 20px;
      font-size: 12px;
      letter-spacing: 1px;
      z-index: 1000;
      transition: all 0.3s;
      opacity: 0;
      transform: translateY(10px);
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.success { border-color: var(--green); color: var(--green); }
    .toast.error { border-color: var(--red); color: var(--red); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="18,2 34,30 2,30" fill="none" stroke="#00d4ff" stroke-width="2"/>
        <polygon points="18,10 28,26 8,26" fill="rgba(0,212,255,0.1)" stroke="#7b2fff" stroke-width="1.5"/>
        <circle cx="18" cy="18" r="2" fill="#00d4ff"/>
      </svg>
    </div>
    <div>
      <div class="logo-text">Altitude</div>
      <div class="logo-sub">Container Control</div>
    </div>
  </div>
  <div class="header-right">
    <div class="status-indicator">
      <div class="dot"></div>
      <span>DOCKER CONNECTED</span>
    </div>
    <div class="last-updated" id="lastUpdated">—</div>
    <button class="refresh-btn" onclick="loadContainers()">⟳ Refresh</button>
  </div>
</header>

<div class="stats-bar">
  <div class="stat-item">
    <div>
      <div class="stat-label">Total</div>
      <div class="stat-value total" id="statTotal">—</div>
    </div>
  </div>
  <div class="stat-item">
    <div>
      <div class="stat-label">Running</div>
      <div class="stat-value running" id="statRunning">—</div>
    </div>
  </div>
  <div class="stat-item">
    <div>
      <div class="stat-label">Stopped</div>
      <div class="stat-value stopped" id="statStopped">—</div>
    </div>
  </div>
  <div class="stat-item">
    <div>
      <div class="stat-label">With UI</div>
      <div class="stat-value total" id="statWithUI">—</div>
    </div>
  </div>
</div>

<div class="toolbar">
  <span class="filter-label">Filter:</span>
  <div class="filter-btns">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="running">Running</button>
    <button class="filter-btn" data-filter="exited">Stopped</button>
  </div>
  <input class="search-box" type="text" placeholder="Search containers..." id="searchBox" oninput="renderCards()" />
</div>

<div class="grid" id="grid">
  <div class="loading">
    <div class="spinner"></div>
    <div class="loading-text">Initializing...</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let allContainers = [];
  let activeFilter = 'all';

  const CONTAINER_ICONS = {
    'portainer': '🐳',
    'nginx': '🌐',
    'postgres': '🐘',
    'mysql': '🐬',
    'redis': '🔴',
    'mongodb': '🍃',
    'grafana': '📊',
    'prometheus': '🔥',
    'traefik': '🔀',
    'home-assistant': '🏠',
    'homeassistant': '🏠',
    'plex': '▶️',
    'jellyfin': '🎬',
    'sonarr': '📺',
    'radarr': '🎥',
    'qbittorrent': '⬇️',
    'pihole': '🚫',
    'nextcloud': '☁️',
    'gitea': '🐙',
    'vaultwarden': '🔐',
    'bitwarden': '🔐',
    'adguard': '🛡️',
    'wireguard': '🔒',
    'node-red': '🔴',
    'nodered': '🔴',
    'influxdb': '📈',
    'elasticsearch': '🔍',
    'kibana': '📉',
    'vault': '🔑',
  };

  function getIcon(name, image) {
    const lower = (name + ' ' + image).toLowerCase();
    for (const [key, icon] of Object.entries(CONTAINER_ICONS)) {
      if (lower.includes(key)) return icon;
    }
    return '📦';
  }

  function formatUptime(status) {
    return status;
  }

  function renderCards() {
    const search = document.getElementById('searchBox').value.toLowerCase();
    const grid = document.getElementById('grid');

    let filtered = allContainers.filter(c => {
      const matchFilter =
        activeFilter === 'all' ||
        (activeFilter === 'running' && c.state === 'running') ||
        (activeFilter === 'exited' && c.state !== 'running');
      const matchSearch =
        !search ||
        c.name.toLowerCase().includes(search) ||
        c.image.toLowerCase().includes(search);
      return matchFilter && matchSearch;
    });

    if (filtered.length === 0) {
      grid.innerHTML = `
        <div class="empty">
          <div class="empty-icon">◈</div>
          <div class="empty-text">No containers found</div>
        </div>`;
      return;
    }

    grid.innerHTML = filtered.map(c => {
      const icon = getIcon(c.name, c.image);
      const stateClass = c.state === 'running' ? 'running' : c.state === 'paused' ? 'paused' : 'exited';
      const hasUrl = !!c.webUrl;

      const portsHtml = c.ports.length
        ? c.ports.slice(0, 2).map(p =>
            `<span class="info-val port-link">${p.public}→${p.private}</span>`
          ).join(', ')
        : '<span class="info-val">—</span>';

      const statsHtml = c.stats ? `
        <div class="stats-mini">
          <div class="mini-stat">
            <div class="mini-label">CPU</div>
            <div class="mini-bar-wrap"><div class="mini-bar" style="width:${Math.min(c.stats.cpu, 100)}%"></div></div>
            <div class="mini-val">${c.stats.cpu}%</div>
          </div>
          <div class="mini-stat">
            <div class="mini-label">MEM</div>
            <div class="mini-bar-wrap"><div class="mini-bar" style="width:${Math.min(c.stats.memPercent, 100)}%"></div></div>
            <div class="mini-val">${c.stats.memUsage} (${c.stats.memPercent}%)</div>
          </div>
        </div>` : '';

      const imageShort = c.image.length > 30 ? c.image.slice(0, 28) + '…' : c.image;

      const clickHandler = hasUrl
        ? `onclick="window.open('${c.webUrl}', '_blank')"`
        : '';

      return `
        <div class="card ${hasUrl ? '' : 'no-url'}" ${clickHandler} data-id="${c.id}">
          <div class="card-corner tl"></div>
          <div class="card-corner tr"></div>
          <div class="card-corner bl"></div>
          <div class="card-corner br"></div>

          <div class="card-header">
            <div class="card-icon">${icon}</div>
            <div class="card-meta">
              <div class="card-name">${c.name}</div>
              <div class="card-image">${imageShort}</div>
            </div>
            <div class="badge ${stateClass}">
              <div class="badge-dot"></div>
              ${c.state}
            </div>
          </div>

          <div class="card-body">
            <div class="info-row">
              <span class="info-key">Status</span>
              <span class="info-val">${c.status}</span>
            </div>
            <div class="info-row">
              <span class="info-key">Ports</span>
              <span>${portsHtml}</span>
            </div>
            ${hasUrl ? `
            <div class="info-row">
              <span class="info-key">Web UI</span>
              <span class="info-val port-link">${c.webUrl}</span>
            </div>` : ''}
            ${statsHtml}
          </div>

          <div class="card-footer" onclick="event.stopPropagation()">
            <span class="card-id">ID: ${c.id}</span>
            <div class="action-btns">
              ${c.state === 'running'
                ? `<button class="action-btn stop" onclick="containerAction('${c.id}', 'stop')">Stop</button>
                   <button class="action-btn" onclick="containerAction('${c.id}', 'restart')">Restart</button>`
                : `<button class="action-btn start" onclick="containerAction('${c.id}', 'start')">Start</button>`
              }
            </div>
          </div>
        </div>`;
    }).join('');
  }

  async function loadContainers() {
    const grid = document.getElementById('grid');
    grid.innerHTML = `<div class="loading"><div class="spinner"></div><div class="loading-text">Loading containers...</div></div>`;

    try {
      const res = await fetch('/api/containers');
      if (!res.ok) throw new Error(await res.text());
      allContainers = await res.json();

      // Sort: running first, then alphabetical
      allContainers.sort((a, b) => {
        if (a.state === b.state) return a.name.localeCompare(b.name);
        return a.state === 'running' ? -1 : 1;
      });

      const running = allContainers.filter(c => c.state === 'running').length;
      const withUI = allContainers.filter(c => c.webUrl).length;

      document.getElementById('statTotal').textContent = allContainers.length;
      document.getElementById('statRunning').textContent = running;
      document.getElementById('statStopped').textContent = allContainers.length - running;
      document.getElementById('statWithUI').textContent = withUI;
      document.getElementById('lastUpdated').textContent =
        new Date().toLocaleTimeString('en-US', { hour12: false });

      renderCards();
    } catch (err) {
      grid.innerHTML = `
        <div class="empty">
          <div class="empty-icon">⚠</div>
          <div class="empty-text">Failed to connect to Docker</div>
        </div>`;
      showToast('Error: ' + err.message, 'error');
    }
  }

  async function containerAction(id, action) {
    try {
      const res = await fetch(`/api/containers/${id}/${action}`, { method: 'POST' });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      showToast(`Container ${action}ed successfully`, 'success');
      setTimeout(loadContainers, 800);
    } catch (err) {
      showToast('Error: ' + err.message, 'error');
    }
  }

  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    setTimeout(() => t.className = 'toast', 3000);
  }

  // Filter buttons
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      renderCards();
    });
  });

  // Auto-refresh every 30 seconds
  loadContainers();
  setInterval(loadContainers, 30000);
</script>
</body>
</html>
